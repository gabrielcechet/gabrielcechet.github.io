<html>
  <head>
    <script type="text/javascript" async src="https://d2umgtt5tsqx05.cloudfront.net/js/loader-scripts/3a4d3fba-4a3c-4e8e-a3b6-caf8023117cd-loader.js" ></script>
  </head>
  
  <body>
    <form id="randomForm">
      <input type="email" name="email" placeholder="E-mail" required />
      <input type="text" name="name" placeholder="Nome" required />
      <input type="submit" value="Enviar" />
    </form>

    <script>
      document.getElementById("randomForm").addEventListener("submit", function (event) {
        setTimeout(() => {
          let form = this.cloneNode(true); // Clona o formulário para evitar conflitos
          form.action = this.action + "?t=" + Date.now(); // Adiciona um timestamp único
          document.body.appendChild(form); // Adiciona o clone ao DOM
          form.submit(); // Submete o clone
        }, 100);
      });
    </script>

    <script>
      function generateRandomName() {
        return 'form_' + Math.random().toString(36).substring(7);
      }

      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("randomForm").name = generateRandomName();
      });
    </script>
  </body>
</html>
